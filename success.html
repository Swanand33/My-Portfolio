<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Swanand Potnis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .success-wrap {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }
        .success-icon svg { width: 28px; height: 28px; color: #22C55E; }
        .success-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 12px;
        }
        .success-card p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .success-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .timer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="success-wrap">
        <div class="success-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h1>Message sent.</h1>
            <p>Thanks for reaching out! I'll review your message and reply within 24 hours. For urgent matters, ping me on LinkedIn.</p>
            <div class="success-actions">
                <a href="/" class="btn btn-primary">Back to Portfolio</a>
                <a href="https://www.linkedin.com/in/swanandpotnis/" target="_blank" class="btn btn-ghost">LinkedIn ↗</a>
                <a href="https://medium.com/@SwanandPotnis" target="_blank" class="btn btn-ghost">Medium ↗</a>
            </div>
            <p class="timer" id="timer"></p>
        </div>
    </div>
    <script>
        let s = 10;
        const el = document.getElementById('timer');
        setTimeout(() => {
            const t = setInterval(() => {
                el.textContent = `Redirecting in ${s}s...`;
                s--;
                if (s < 0) { clearInterval(t); window.location.href = '/'; }
            }, 1000);
        }, 3000);
    </script>
</body>
</html>
